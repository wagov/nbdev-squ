name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3

      - name: Run checks
        run: mise run ci
